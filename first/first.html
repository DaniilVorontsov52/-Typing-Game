<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<meta http-equiv="X-UA-Compatible" content="IE=edge" />
		<title></title>
		<meta name="description" content="" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="stylesheet" href="" />
		<link rel="stylesheet" href="first.css" />
	</head>
	<body class="bcol1">
		<div class="space3"></div>
		<div class="cont2">
			<div class="cont22">
				<div class="box01">
					<img src="/ASSETS/Party.svg" alt="" />
				</div>
				<div class="space2"></div>
				<div class="box02">
					<h1 class="col5 sp">High Score Smashed!</h1>
					<p class="sp">You’re getting faster. That was incredible typing.</p>
				</div>
				<div class="space2"></div>
				<div class="box03">
					<div class="boox">
						<p>WPM: <span class="col5">0</span></p>
					</div>
					<div class="space1"></div>

					<div class="boox">
						<p>Accuracy: <span class="col8">0%</span></p>
					</div>
					<div class="space1"></div>
					<div class="boox">
						<p>
							Characters: <span class="col9">0</span>/<span class="col8"
								>0</span
							>
						</p>
					</div>
				</div>
				<div class="space2"></div>
				<div class="box04">
					<button class="btn3 ttt" id="redo">
						<div class="img">
							<p>Restart Test</p>
							<div id="redo2" class="">
								<img src="/ASSETS/Undo Icon.png" alt="" />
							</div>
						</div>
					</button>
				</div>
			</div>
		</div>
		<div>
			<img src="/ASSETS/Confettis.svg" alt="" />
		</div>
		<script>
			function loadResults() {
				const raw = localStorage.getItem("lastTypingTestResults");
				if (!raw) return;
				const data = JSON.parse(raw);
				document.getElementById("wpm").textContent = data.wpm ?? 0;
				document.getElementById("accuracy").textContent =
					(data.accuracy ?? 0) + "%";
				document.getElementById("correct").textContent = data.correctChars ?? 0;
				document.getElementById("wrong").textContent = data.wrongChars ?? 0;
			}
			document.getElementById("redo").addEventListener("click", function () {
				window.location.href = "/home/index.html";
			});
			loadResults();
		</script>
	</body>
</html>
